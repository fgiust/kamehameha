# Minimal Supabase CLI config for remote migrations.
# Link the repo once with:
#   npm run db:link -- --project-ref <your-project-ref>

project_id = "nihongoapp"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 17

[db.migrations]
enabled = true
